<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Graham Coombs' Wsbite</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="mainstyle.css">
</head>
<body>

    <!-- Main container to center content on the page -->
    <div class="container">
        
        <!-- Header section -->
        <header>
            <!-- This section uses a gradient background, white text, and rounded corners -->
            <h1>Hello World</h1>
            <p>Testing</p>
        </header>

        <!-- Navigation bar -->
        <nav>
            <!-- Unordered list that creates horizontal navigation links -->
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!-- Blog Content Section -->
        <div class="main-content">
            <h1>Latest Blog Posts</h1>
            <div id="blog-posts"></div> <!-- This is where blog posts will be loaded -->
        </div>

        <!-- Footer section -->
        <footer>
            <!-- Footer uses light gray background, smaller font size, and a horizontal layout -->
            <p>&copy; GrahamCoombs.guthub.io | <a href="#privacy">This should be a privacy button</a> | <a href="#terms">This should be a TOS</a></p>
        </footer>

    </div>

        <!-- JavaScript to Load Blog Posts Dynamically -->
    <script>
        // Fetch the JSON file containing the blog posts
        fetch('posts.json')
            .then(response => response.json()) // Parse the JSON
            .then(posts => {
                const postsContainer = document.getElementById('blog-posts');
                posts.forEach(post => {
                    // Create an HTML block for each post
                    const postElement = document.createElement('div');
                    postElement.classList.add('blog-post');
                    postElement.innerHTML = `
                        <h2><a href="post.html?id=${post.id}">${post.title}</a></h2>
                        <p>Published on ${post.date}</p>
                        <p>${post.summary}</p>
                    `;
                    postsContainer.appendChild(postElement);
                });
            })
            .catch(error => console.error('Error loading blog posts:', error));
    </script>

</body>
</html>
